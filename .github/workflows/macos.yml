name: Macos RDP (Browser Login)

on:
  workflow_dispatch:
  schedule:
     - cron: '0 */6 * * *'
jobs:
  build:
    runs-on: macos-latest-large

    steps:
      - name: Enable RDP & Firewall Rules
        run: |
           sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist
           sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure -access -on \
            -configure -allowAccessFor -allUsers \
            -configure -restart -agent \
            -configure -privs -all
            if ! command -v brew &>/dev/null; then
           /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
           fi
           brew install xrdp
           brew services start xrdp
           sudo /usr/libexec/ApplicationFirewall/socketfilterfw --add /System/Library/CoreServices/RemoteManagement/ARDAgent.app
           sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate on
           echo "Done. Connect via RDP (port 3389) or VNC (port 5900) to $(ipconfig getifaddr en0)"


      - name: Create RDP User
        run: |
          # Hardcoded to bypass generation errors but still pass Windows complexity rules

          PASSWORD="RootUser123!"
          USERNAME="RDP"
          sudo dscl . -create /Users/$USERNAME
          sudo dscl . -create /Users/$USERNAME UserShell /bin/bash
          sudo dscl . -create /Users/$USERNAME RealName "$USERNAME"
          sudo dscl . -create /Users/$USERNAME UniqueID 1001
          sudo dscl . -create /Users/$USERNAME PrimaryGroupID 20
          sudo dscl . -create /Users/$USERNAME NFSHomeDirectory /Users/$USERNAME
          sudo createhomedir -c -u $USERNAME
          sudo dscl . -passwd /Users/$USERNAME "$PASSWORD"
          # Add to admin group (equivalent to "net localgroup administrators")
          sudo dscl . -append /Groups/admin GroupMembership $USERNAME
          echo "User '$USERNAME' created and added to administrators."




          





      - name: Install Tailscale
        run: |
          # Swapped to the .exe link because Tailscale removed the .msi direct link
          curl -L "https://pkgs.tailscale.com/stable/Tailscale%20latest.pkg" -o tailscale.pkg
          sudo installer -pkg tailscale.pkg -target /
          sleep5
      - name: Start Tailscale & Wait for Login
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=cat-$GITHUB_RUN_ID

      - name: Keep Session Alive
        run: |
          echo "RDP Session is active."
          while ($true) { Start-Sleep -Seconds 300 }
